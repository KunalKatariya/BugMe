name: bugme
description: "BugMe - Voice-powered personal budget tracker."
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Database
  drift: ^2.22.0
  drift_flutter: ^0.2.2
  sqlite3_flutter_libs: ^0.5.0

  # State management
  flutter_riverpod: ^2.6.1

  # Voice and Speech
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1

  # AI
  google_generative_ai: ^0.4.0

  # Charts and Animations
  fl_chart: ^0.70.2
  flutter_animate: ^4.5.2

  # Utilities
  intl: ^0.20.1
  uuid: ^4.5.1
  shared_preferences: ^2.3.5
  path_provider: ^2.1.5
  path: ^1.9.1
  cupertino_icons: ^1.0.8
  excel: ^4.0.6
  share_plus: ^10.0.2
  file_picker: ^10.3.10
  home_widget: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.22.0

flutter:
  uses-material-design: true
